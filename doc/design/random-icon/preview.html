<!-- @dsCard group="KIKU 앱" viewport="820x400" name="KIKU 랜덤(셔플) 버튼 아이콘" subtitle="글리프 · 골드필 · 다크서피스 · 상태" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{--bg:#0F1115;--surf:#191E28;--surf2:#1F2530;--line:rgba(255,255,255,.08);--gold:#F3C14E;--tx:#fff;--mut:#9BA3B0;--faint:#6B7280}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--tx);padding:36px 30px 48px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
  .sub{font-size:13px;color:var(--mut);margin:0 0 30px}
  .grid{display:flex;gap:34px;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
  .lab{font-size:12px;color:var(--faint)}
  svg{display:block}
  /* filled gold circle */
  .fab{width:64px;height:64px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(243,193,78,.36)}
  /* dark surface circle */
  .ico{width:52px;height:52px;border-radius:50%;background:var(--surf);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  /* pill button (hero CTA) */
  .pill{display:inline-flex;align-items:center;gap:9px;background:var(--gold);color:var(--bg);font-weight:800;font-size:15px;padding:12px 22px;border-radius:999px}
  /* small in-list */
  .mini{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center}
  .row{display:flex;gap:22px;align-items:center;background:#141822;border:1px solid var(--line);border-radius:16px;padding:18px 22px}
  .sizes{display:flex;gap:24px;align-items:flex-end}
  .sec{font-size:12px;font-weight:700;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin:32px 0 16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>랜덤(셔플) 버튼 아이콘</h1>
  <p class="sub">"전체 랜덤" 기능용. 교차 화살표 = 무작위. 다크+골드 브랜드에 맞춤.</p>

  <div class="grid">
    <div class="cell"><div class="fab"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#0F1115" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg></div><span class="lab">골드 FAB (메인)</span></div>
    <div class="cell"><div class="ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F3C14E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg></div><span class="lab">다크 서피스</span></div>
    <div class="cell"><span class="pill"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0F1115" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg> 전체 랜덤</span><span class="lab">히어로 CTA</span></div>
    <div class="cell"><div class="mini"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9BA3B0" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg></div><span class="lab">리스트 소형</span></div>
  </div>

  <p class="sec">글리프 · 크기별 (골드)</p>
  <div class="sizes">
    <div class="cell"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#F3C14E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg><span class="lab">40</span></div>
    <div class="cell"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F3C14E" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg><span class="lab">28</span></div>
    <div class="cell"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F3C14E" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg><span class="lab">20</span></div>
  </div>
</div>
</body>
</html>
